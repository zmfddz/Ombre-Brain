<style>
  :root {
    --paper:        oklch(0.975 0.012 88);
    --paper-deep:   oklch(0.955 0.018 86);
    --paper-shadow: oklch(0.92 0.022 84);
    --ink:          oklch(0.22 0.025 150);
    --ink-soft:     oklch(0.40 0.025 150);
    --ink-faint:    oklch(0.62 0.020 145);
    --moss:         oklch(0.42 0.065 150);
    --moss-deep:    oklch(0.32 0.07 152);
    --leaf:         oklch(0.58 0.10 145);
    --leaf-bright:  oklch(0.72 0.13 135);
    --rose:         oklch(0.72 0.115 22);
    --rose-deep:    oklch(0.58 0.13 22);
    --blush:        oklch(0.88 0.045 25);
    --amber:        oklch(0.78 0.12 70);
    --sky:          oklch(0.78 0.06 230);
    --line:         oklch(0.85 0.018 90);

    --serif: "Cormorant Garamond", "LXGW WenKai", "Songti SC", serif;
    --sans:  "Nunito", "LXGW WenKai", -apple-system, "PingFang SC", sans-serif;
    --kai:   "LXGW WenKai", "Kaiti SC", "STKaiti", serif;
    --mono:  "JetBrains Mono", ui-monospace, monospace;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  /* paper grain */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image:
      radial-gradient(1px 1px at 23% 17%, oklch(0.85 0.04 80 / 0.18), transparent 50%),
      radial-gradient(1px 1px at 71% 43%, oklch(0.85 0.04 80 / 0.15), transparent 50%),
      radial-gradient(1px 1px at 47% 81%, oklch(0.85 0.04 80 / 0.12), transparent 50%),
      radial-gradient(1px 1px at 88% 12%, oklch(0.85 0.04 80 / 0.18), transparent 50%);
    background-size: 320px 320px, 280px 280px, 360px 360px, 240px 240px;
    mix-blend-mode: multiply;
    opacity: 0.6;
  }

  #root { position: relative; z-index: 1; }

  ::selection { background: oklch(0.88 0.07 25 / 0.5); color: var(--ink); }

  /* scrollbar */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb {
    background: var(--paper-shadow);
    border-radius: 4px;
  }
  ::-webkit-scrollbar-thumb:hover { background: var(--ink-faint); }

  /* loading */
  .boot {
    min-height: 100vh;
    display: grid;
    place-items: center;
    font-family: var(--serif);
    font-style: italic;
    color: var(--ink-faint);
    font-size: 1.2rem;
    letter-spacing: 0.04em;
  }
  .boot .leaf {
    display: inline-block;
    animation: sway 2.4s ease-in-out infinite;
    transform-origin: bottom center;
    margin-right: 0.5em;
  }
  @keyframes sway {
    0%, 100% { transform: rotate(-8deg); }
    50%      { transform: rotate(10deg); }
  }
</style>

<script type="application/json" id="speaker-notes">[]</script>
</head>

<body>
<div id="root">
  <div class="boot">
    <span class="leaf">🌿</span> 花园正在苏醒…
  </div>
</div>
